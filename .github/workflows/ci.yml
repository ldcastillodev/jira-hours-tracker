name: CI

on:
  push:
    branches: [develop, main]
    paths:
      - 'apps/**'
      - 'packages/**'
      - 'api/**'
      - 'eslint.config.mjs'
      - 'package.json'
      - 'package-lock.json'
      - 'turbo.json'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [develop, main]
    paths:
      - 'apps/**'
      - 'packages/**'
      - 'api/**'
      - 'eslint.config.mjs'
      - 'package.json'
      - 'package-lock.json'
      - 'turbo.json'
      - '.github/workflows/ci.yml'
  workflow_dispatch:

jobs:
  ci:
    name: Lint, Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate --schema=packages/db/prisma/schema.prisma

      - name: Check formatting
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        run: npm test
